<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Estante de Histórias</title>
    <style>
        /* Estilo Dark inspirado em bibliotecas digitais */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 { color: #3498db; margin-bottom: 10px; }

        /* A Estante (Grid) */
        .estante {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }

        /* O Card do Livro */
        .livro-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: inherit;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .livro-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: #3498db;
        }

        /* Container da Capa */
        .capa-container {
            width: 100%;
            height: 320px; /* Proporção de capa de livro */
            background-color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .capa-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz a imagem preencher o espaço sem distorcer */
        }

        .capa-placeholder {
            font-weight: bold;
            color: #5d6d7e;
            text-align: center;
            padding: 20px;
        }

        /* Info do Livro */
        .livro-info {
            padding: 15px;
            text-align: center;
        }

        .livro-info h2 {
            font-size: 1.1rem;
            margin: 0 0 8px 0;
            color: #fff;
        }

        .livro-info p {
            font-size: 0.85rem;
            color: #bbb;
            margin: 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<header>
    <h1>Minha Biblioteca Digital</h1>
    <p>Clique na capa para ler a história completa no Google Docs.</p>
</header>

<div class="estante">

    <a href="https://docs.google.com/document/d/1Gw4U7e1amEd6D_PiHD2coxOfe6AfCgS8Qp6jdrw4C6E/edit?usp=sharing" target="_blank" class="livro-card">
        <div class="capa-container">
            <img src="https://via.placeholder.com/220x320?text=O+Livro+Amaldiçoado" alt="Capa O Livro Amaldiçoado">
        </div>
        <div class="livro-info">
            <h2>O Livro Amaldiçoado</h2>
            <p>Uma sinopse instigante sobre mistérios e sombras.</p>
        </div>
    </a>

    <a href="https://docs.google.com/document/d/12poHRCAghAmmvW-oyXqn0ee-vBwbsGB8sE13vbeX3lU/edit?usp=sharing" target="_blank" class="livro-card">
        <div class="capa-container">
            <img src="https://via.placeholder.com/220x320?text=Wasted" alt="Capa Wasted">
        </div>
        <div class="livro-info">
            <h2>Wasted</h2>
            <p>Uma transmissão desesperada vinda de um lugar esquecido.</p>
        </div>
    </a>

</div>

</body>
</html>
